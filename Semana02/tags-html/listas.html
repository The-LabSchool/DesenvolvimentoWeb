<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Listas</title>
</head>
<body>

    <!-- HTML - Listas -->

    <h1>Listas</h1>

    <h2>Lista Ordenada</h2>
    <ol type="1" start="3">
        <li>colocar ovos na batedeira</li>
        <li>colocar o açucar</li>
        <li>colocar a canela</li>
        <li>colocar a manteiga</li>
    </ol>    

    <h2>Lista Não Ordenada</h2>
    <ul type="square">
        <li>comprar café</li>
        <li>comprar pão</li>
        <li>comprar suco</li>
        <li>
            comprar produtos de limpeza:
            <ul>
                <li>detergente</li>
                <li>sabão</li>
                <li>desinfetante</li>
            </ul>    
        </li>    
    </ul>    

    
</body>
</html>
